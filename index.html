<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주성치와 함께하는 디자인 여행</title>
<link rel="icon" type="image/png" href="assets/dssync.png">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.css">
<style>
  :root {
    --bg-base: #080a0d;
    --bg-surface: #0d0f12;
    --bg-elevated: #131518;
    --bg-hover: #18191d;
    --border: #272b31;
    --border-subtle: #1c1f24;
    --border-gold: rgba(180,140,60,0.35);
    --text-primary: #c8cdd4;
    --text-secondary: #868d99;
    --text-muted: #565d6a;
    --gold: #c9a84c;
    --gold-dim: rgba(201,168,76,0.12);
    --gold-bright: #f0c060;
    --accent-blue: #3b82f6;
    --accent-blue-dim: rgba(59,130,246,0.14);
    --accent-green: #3ba55d;
    --accent-green-dim: rgba(59,165,93,0.13);
    --accent-amber: #c96b1a;
    --accent-amber-dim: rgba(201,107,26,0.14);
    --accent-yellow: #c9a020;
    --accent-yellow-dim: rgba(201,160,32,0.14);
    --accent-red: #c03737;
    --accent-red-dim: rgba(192,55,55,0.14);
    --accent-purple: #bf3f8c;
    --accent-purple-dim: rgba(191,63,140,0.14);
    --accent-cyan: #3aa8c4;
    --accent-cyan-dim: rgba(58,168,196,0.13);
    --accent-violet: #7c4dff;
    --accent-violet-dim: rgba(124,77,255,0.14);
    --sidebar-w: 256px;
    --globalbar-h: 50px;
    --radius-sm: 3px;
    --radius-md: 6px;
    --radius-lg: 10px;
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.5);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.6);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.75);
    --shadow-gold: 0 0 12px rgba(201,168,76,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-size: 15px;
    background: var(--bg-base);
    color: var(--text-primary);
    line-height: 1.5;
    cursor: default;
  }

  /* ── Subtle bg texture ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      radial-gradient(ellipse 60% 40% at 15% 50%, rgba(138,111,212,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 85% 20%, rgba(74,144,217,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 50% 30% at 50% 100%, rgba(201,168,76,0.03) 0%, transparent 70%);
  }

  /* ── Layout ─── */
  #app { display: flex; height: 100vh; overflow: hidden; position: relative; z-index: 1; }


  /* ── Sidebar ─── */
  #sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--bg-surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    transition: width 0.22s ease, min-width 0.22s ease;
  }
  #sidebar.collapsed {
    width: 0;
    min-width: 0;
    border-right-color: transparent;
  }
  .sidebar-banner {
    flex-shrink: 0;
    width: 100%;
    height: 160px;
    overflow: hidden;
    position: relative;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-banner img {
    width: 100%;
    height: 100%;
    cursor: pointer;
    object-fit: cover;
    object-position: center top;
    display: block;
  }
  .sidebar-section-label {
    padding: 12px 16px 4px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .sidebar-section-label::before, .sidebar-section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .sidebar-section-label::before, .sidebar-section-label::after { display: none; }
  .project-list { flex: 1; overflow-y: auto; padding: 6px 0 10px; }
  .project-item {
    padding: 8px 10px;
    margin: 2px 8px;
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    border: 1px solid transparent;
    position: relative;
  }
  .project-item:hover { background: var(--bg-hover); }
  .project-item.active {
    background: var(--bg-hover);
    border-color: var(--border);
  }
  .project-item-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }
  .project-item.active .project-item-name { color: var(--text-primary); }
  .project-item-meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .project-item-brief {
    font-size: 11.5px;
    color: var(--text-secondary);
    margin-bottom: 5px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 1.4;
  }
  .project-item-id {
    font-size: 10.5px;
    color: var(--text-muted);
    margin-bottom: 6px;
    cursor: pointer;
    letter-spacing: 0.04em;
    font-variant-numeric: tabular-nums;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    width: fit-content;
  }
  .copy-flash {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-gold);
    color: var(--gold);
    padding: 7px 15px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 500;
    pointer-events: none;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .copy-flash.show { opacity: 1; }

  /* ── Badges ─── */
  .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    padding-top: 4px;
    padding-bottom: 4px;
    padding-left: 8px;
    padding-right: 8px;
    min-width: 52px;
    border-radius: 2px;
    font-size: 11px;
    font-weight: 600;
    line-height: 1;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .badge-green  { background: var(--accent-green-dim);  color: var(--accent-green);  border: 1px solid rgba(59,165,93,0.25);   }
  .badge-amber  { background: var(--accent-amber-dim);  color: var(--accent-amber);  border: 1px solid rgba(201,107,26,0.25);  }
  .badge-yellow { background: var(--accent-yellow-dim); color: var(--accent-yellow); border: 1px solid rgba(201,160,32,0.25);  }
  .badge-blue   { background: var(--accent-blue-dim);   color: var(--accent-blue);   border: 1px solid rgba(59,130,246,0.25);  }
  .badge-red    { background: var(--accent-red-dim);    color: var(--accent-red);    border: 1px solid rgba(192,55,55,0.25);   }
  .badge-purple { background: var(--accent-purple-dim); color: var(--accent-purple); border: 1px solid rgba(191,63,140,0.25);  }
  .badge-cyan   { background: var(--accent-cyan-dim);   color: var(--accent-cyan);   border: 1px solid rgba(58,168,196,0.25);  }
  .badge-violet { background: var(--accent-violet-dim); color: var(--accent-violet); border: 1px solid rgba(124,77,255,0.25);  }
  .log-agent .badge { width: 90px; justify-content: center; }
  .badge-gray   { background: var(--bg-elevated);       color: var(--text-muted);    border: 1px solid var(--border);          }
  .badge-gold   { background: var(--gold-dim);          color: var(--gold);          border: 1px solid var(--border-gold);     }
  .badge-sm     { font-size: 9.5px !important; padding: 2px 5px !important; min-width: auto !important; letter-spacing: 0 !important; }

  /* ── Main ─── */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

  /* ── Global Bar ─── */
  #globalbar {
    height: var(--globalbar-h);
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 14px;
    flex-shrink: 0;
    position: relative;
  }
  .globalbar-left { display: flex; align-items: center; gap: 12px; flex: 1; }
  .globalbar-right { display: flex; align-items: center; gap: 8px; }
  .globalbar-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: -0.01em;
  }
  .ds-sync-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
  }
  .ds-sync-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
  }
  .ds-sync-time { font-size: 12px; color: var(--text-muted); }
  .icon-btn {
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    border-radius: var(--radius-sm);
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
    font-size: 16px;
    line-height: 1;
  }
  #sidebar-toggle { width: auto; padding: 0 12px; font-size: 12px; white-space: nowrap; }
  .icon-btn:hover { background: var(--bg-hover); border-color: var(--text-muted); color: var(--text-primary); }

  /* ── Project Header ─── */
  #project-header {
    padding: 16px 22px 0;
    flex-shrink: 0;
  }
  .project-header-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 12px;
  }
  .project-header-left { flex: 1; min-width: 0; }
  .project-name-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
    flex-wrap: wrap;
  }
  .project-brief {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 8px;
    line-height: 1.4;
  }
  .project-quest-mark {
    font-size: 11px;
    color: var(--gold);
    opacity: 0.7;
    margin-right: -4px;
  }
  .project-name {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }
  .project-meta-row {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12.5px;
    color: var(--text-secondary);
    flex-wrap: wrap;
  }
  .project-meta-item { display: flex; align-items: center; gap: 4px; }
  .project-meta-item .label { color: var(--text-muted); }
  .project-header-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
  .btn {
    padding: 6px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    color: var(--text-primary);
    transition: background 0.12s, border-color 0.12s, color 0.12s;
    white-space: nowrap;
    position: relative;
  }
  .btn:hover { background: var(--bg-hover); border-color: var(--text-muted); color: var(--text-primary); }
  .btn-gold {
    background: var(--gold-dim);
    border-color: var(--border-gold);
    color: var(--gold-bright);
  }
  .btn-gold:hover { background: rgba(201,168,76,0.2); color: var(--gold-bright); }

  /* ── Content ─── */
  #content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 12px 22px 12px;
    gap: 8px;
  }

  /* ── Kanban ─── */
  #kanban {
    flex: 1;
    display: flex;
    gap: 10px;
    overflow-x: auto;
    overflow-y: hidden;
    min-height: 0;
    padding-bottom: 2px;
  }

  .kanban-col {
    flex: 1;
    min-width: 180px;
    display: flex;
    flex-direction: column;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    overflow: hidden;
    position: relative;
  }
  /* top accent line per column */
  .kanban-col::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--col-accent, var(--border));
    border-radius: var(--radius-md) var(--radius-md) 0 0;
  }

  .kanban-col-header {
    padding: 11px 13px 9px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    padding-top: 13px;
  }
  .kanban-col-title { display: flex; align-items: center; gap: 7px; }
  .col-class-icon {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
    image-rendering: pixelated;
  }
  .kanban-col-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    font-family: 'Pretendard', sans-serif;
    letter-spacing: -0.01em;
  }
  .kanban-col-duration {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'Pretendard', sans-serif;
  }
  .kanban-col-body {
    flex: 1;
    overflow-y: auto;
    padding: 9px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* ── Cards ─── */
  .kanban-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 11px;
    cursor: pointer;
    transition: border-color 0.12s, transform 0.1s, box-shadow 0.12s;
    position: relative;
    word-break: break-all;
    overflow-wrap: break-word;
  }
  .kanban-card:hover { border-color: var(--text-muted); transform: translateY(-1px); box-shadow: var(--shadow-sm); }

  .kanban-card.status-idle     { opacity: 0.6; }

  .card-status-row { display: flex; align-items: center; gap: 5px; margin-bottom: 6px; }
  .card-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.55;
    margin-bottom: 8px;
  }
  .card-summary-line {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.5;
    margin-bottom: 5px;
    font-family: 'Pretendard', sans-serif;
  }
  .card-thinking {
    font-size: 11.5px;
    color: var(--text-secondary);
    line-height: 1.65;
    max-height: 130px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
    margin-bottom: 8px;
    padding-right: 2px;
    font-family: 'Pretendard', sans-serif;
  }
  /* validator result badge on card */
  .card-result { display: flex; align-items: center; gap: 5px; margin-bottom: 6px; flex-wrap: wrap; }
  .card-result-pass { display: inline-flex; align-items: center; padding: 2px 7px; background: var(--accent-green-dim); color: var(--accent-green); border: 1px solid rgba(59,165,93,0.3); border-radius: 3px; font-size: 10.5px; font-weight: 700; letter-spacing: 0.06em; }
  .card-result-fail { display: inline-flex; align-items: center; padding: 2px 7px; background: var(--accent-red-dim); color: var(--accent-red); border: 1px solid rgba(192,55,55,0.3); border-radius: 3px; font-size: 10.5px; font-weight: 700; letter-spacing: 0.06em; }
  .card-result-counts { font-size: 10.5px; color: var(--text-muted); }
  .card-result-blocker { color: var(--accent-red); font-weight: 600; }
  .card-result-warn { color: var(--accent-amber); font-weight: 600; }
  .card-result-note { color: var(--text-muted); }
  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    font-family: 'Pretendard', sans-serif;
  }
  .card-time   { color: var(--text-muted); }
  .card-duration { font-weight: 500; color: var(--text-secondary); }

  /* attempt cards */
  .kanban-card.attempt-prev {
    opacity: 0.5;
    border-style: dashed;
  }
  .attempt-num {
    margin-left: auto;
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  /* builder column */
  .builder-figma-preview {
    margin-top: 8px;
    padding: 8px 9px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    position: relative;
  }
  .builder-figma-preview::before {
    content: '';
    position: absolute;
    top: -1px; left: -1px;
    width: 8px; height: 8px;
    border-top: 1px solid var(--accent-purple);
    border-left: 1px solid var(--accent-purple);
    border-radius: 2px 0 0 0;
  }
  .builder-figma-label {
    font-size: 10.5px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 5px;
  }
  .builder-figma-detail {
    font-size: 11.5px;
    color: var(--text-secondary);
    font-family: 'Pretendard', sans-serif;
    line-height: 1.65;
  }

  /* ── Log Area ─── */
  #log-area {
    height: 320px;
    min-height: 220px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    display: flex;
    flex-direction: row;
    overflow: hidden;
    flex-shrink: 0;
    position: relative;
  }
  #log-panel, #director-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }
  #log-panel { border-right: 1px solid var(--border); }
  #director-panel .log-line { cursor: default; }
  #director-panel .log-line:hover { background: transparent; }

  /* ── Director Panel items ─── */
  .dp-director-msg {
    display: grid;
    grid-template-columns: 62px 100px 1fr;
    align-items: baseline;
    gap: 0 8px;
    padding: 3px 14px;
    border-bottom: 1px solid var(--border-subtle);
    line-height: 1.55;
  }
  .dp-ts { color: var(--text-muted); }
  .dp-badge { flex-shrink: 0; overflow: hidden; }
  .dp-msg { font-size: 13px; color: var(--text-secondary); line-height: 1.55; }
  .dp-empty { padding: 24px; text-align: center; color: var(--text-muted); font-size: 12px; font-style: italic; opacity: 0.6; }
  .log-header {
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .log-header-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Pretendard', sans-serif;
    letter-spacing: 0.04em;
  }
  .log-count {
    font-size: 11px;
    font-weight: 400;
    color: var(--text-muted);
    font-family: 'Pretendard', sans-serif;
  }
  .log-body {
    flex: 1;
    overflow-y: auto;
    padding: 5px 0;
    font-family: 'Pretendard', sans-serif;
    font-size: 13px;
  }
  .log-line {
    display: grid;
    grid-template-columns: 62px 100px 1fr;
    align-items: baseline;
    gap: 0 8px;
    padding: 3px 14px;
    cursor: pointer;
    transition: background 0.1s;
    line-height: 1.55;
  }
  .log-line:hover { background: var(--bg-hover); }
  .log-ts    { color: var(--text-muted); }
  .log-agent { overflow: hidden; }
  .log-msg   { color: var(--text-secondary); min-width: 0; }
  .log-line.log-rollback .log-msg { color: var(--accent-amber); }
  .log-line.log-complete .log-msg { color: var(--accent-green); }
  .log-line.log-error    .log-msg { color: var(--accent-red);   }


  /* ── Conv Table (markdown rendering) ─── */
  .conv-table {
    width: 100%;
    border-collapse: collapse;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: 'Pretendard', sans-serif;
    font-size: 12.5px;
  }
  .conv-table th {
    padding: 6px 10px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--border);
    background: var(--bg-surface);
  }
  .conv-table td {
    padding: 6px 10px;
    color: var(--text-primary);
    border-bottom: 1px solid var(--border-subtle);
    line-height: 1.55;
  }
  .conv-table tr:last-child td { border-bottom: none; }
  .conv-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  /* ── Modals ─── */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s;
  }
  .modal-backdrop.open { opacity: 1; pointer-events: all; }

<script>
// ── Data ──────────────────────────────────────────────────────────────────────
let GLOBAL = { dsSyncLastAt: '—' };
let PROJECTS = [];
let SYSTEM_CHANGES = [];

// ── State ─────────────────────────────────────────────────────────────────────
let activeProjectId = null;
let activeModal = null;

// ── Sidebar Toggle ────────────────────────────────────────────────────────────
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const btn = document.getElementById('sidebar-toggle');
  sidebar.classList.toggle('collapsed');
  btn.textContent = sidebar.classList.contains('collapsed') ? '펼치기' : '접기';
}

// ── Column config ─────────────────────────────────────────────────────────────
const COL_CONFIG = {
  'planner':     { label: 'planner',        icon: 'assets/planner.png',   accent: '#3b82f6' },
  'validator':   { label: 'validator',      icon: 'assets/validator.png', accent: '#c9a020' },
  'ux-improver': { label: 'ux-improver',    icon: 'assets/improver.png',  accent: '#3aa8c4' },
  'ui-designer': { label: 'ui-designer',    icon: 'assets/designer.png',  accent: '#3ba55d' },
  'builder':     { label: 'figma-builder',  icon: 'assets/builder.png',   accent: '#bf3f8c' },
  'reviewer':    { label: 'figma-reviewer', icon: 'assets/reviewer.png',  accent: '#7c4dff' },
};

// ── Helpers ───────────────────────────────────────────────────────────────────
function statusText(status) {
  const map = {
    done:        ['var(--accent-green)',  '완료'],
    running:     ['var(--accent-blue)',   '실행 중'],
    idle:        ['var(--text-muted)',    '대기'],
    rollback:    ['var(--accent-amber)',  '롤백'],
    error:       ['var(--accent-red)',    '오류'],
    completed:   ['var(--accent-green)',  '완료'],
    in_progress: ['var(--accent-blue)',   '진행 중'],
    design_done: ['var(--accent-amber)',  '설계 완료'],
  };
  const [color, label] = map[status] || ['var(--text-muted)', status];
  return `<span style="color:${color};font-size:11px;font-weight:600;letter-spacing:0.03em">${label}</span>`;
}

function getStatusBadge(status) {
  const map = {
    done:        ['badge-green',  '완료'],
    running:     ['badge-blue',   '실행 중'],
    idle:        ['badge-gray',   '대기'],
    rollback:    ['badge-amber',  '롤백'],
    completed:   ['badge-green',  '완료'],
    in_progress: ['badge-blue',   '진행 중'],
    draft:       ['badge-gray',   '준비'],
    design_done: ['badge-amber',  '설계 완료'],
  };
  const [cls, label] = map[status] || ['badge-gray', status];
  return `<span class="badge ${cls}">${label}</span>`;
}

function getLogClass(type) {
  const m = { rollback:'log-rollback', complete:'log-complete', start:'log-start', error:'log-error', figma:'log-figma' };
  return m[type] || '';
}

function getAgentBadge(agent) {
  const m = {
    planner:          'badge-blue',
    'validator-plan': 'badge-yellow', 'plan-validator': 'badge-yellow',
    validator:        'badge-yellow',
    'ux-improver':    'badge-cyan',
    'ui-designer':    'badge-green',
    builder:          'badge-purple', 'figma-builder': 'badge-purple',
    reviewer:         'badge-violet', 'figma-reviewer': 'badge-violet',
    director:         'badge-gray'
  };
  return m[agent] || 'badge-gray';
}

function getAgentLabel(agent) {
  const m = {
    planner:          'planner',
    'validator-plan': 'validator', 'plan-validator': 'validator',
    validator:        'validator',
    'ux-improver':    'ux-improver',
    'ui-designer':    'ui-designer',
    builder:          'builder',  'figma-builder':  'builder',
    reviewer:         'reviewer', 'figma-reviewer': 'reviewer',
    director:         'director',
  };
  return m[agent] || agent;
}

function displayDuration(a) {
  if (!a) return '—';
  if (a.executionDuration && a.duration) {
    return `${a.executionDuration} <span style="color:var(--text-muted);font-weight:400">(총 ${a.duration})</span>`;
  }
  return a.executionDuration || a.duration || '';
}

function getProgressBadge(p) {
  if (!p) return '';
  if (p.mode?.startsWith('생성 모드')) return '<span class="badge badge-purple">생성</span>';
  if (p.mode?.startsWith('설계 모드')) return '<span class="badge badge-cyan">설계</span>';
  return '';
}

// ── Copy Quest ID ─────────────────────────────────────────────────────────────
function copyQuestId(id, event) {
  event.stopPropagation();
  const text = id;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showCopyFlash(text)).catch(() => legacyCopy(text));
  } else {
    legacyCopy(text);
  }
}
function legacyCopy(text) {
  const el = document.createElement('textarea');
  el.value = text;
  el.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
  document.body.appendChild(el);
  el.select();
  document.execCommand('copy');
  document.body.removeChild(el);
  showCopyFlash(text);
}
function showCopyFlash(text) {
  let flash = document.getElementById('copy-flash');
  if (!flash) {
    flash = document.createElement('div');
    flash.id = 'copy-flash';
    flash.className = 'copy-flash';
    document.body.appendChild(flash);
  }
  flash.textContent = '"' + text + '" 복사됨';
  flash.classList.add('show');
  clearTimeout(flash._timer);
  flash._timer = setTimeout(() => flash.classList.remove('show'), 2200);
}

// ── Markdown Renderer ─────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function inlineMd(text) {
  let t = escHtml(text);
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--text-primary);font-weight:700">$1</strong>');
  t = t.replace(/(?<!\*)\*([^*\n]+?)\*(?!\*)/g, '<em style="color:var(--text-secondary)">$1</em>');
  t = t.replace(/`([^`\n]+)`/g, '<code style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:2px;padding:1px 5px;font-size:11px;font-family:monospace;color:var(--accent-cyan)">$1</code>');
  return t;
}
function renderMdTable(tableLines) {
  const rows = tableLines.map(l => l.split('|').slice(1,-1).map(c => c.trim()));
  if (rows.length < 2) return '';
  const headers = rows[0];
  const dataRows = rows.slice(2);
  const head = headers.map(h => `<th>${inlineMd(h)}</th>`).join('');
  const body = dataRows.map(row =>
    `<tr>${row.map(c => `<td>${inlineMd(c)}</td>`).join('')}</tr>`
  ).join('');
  return `<div style="overflow-x:auto;margin:8px 0"><table class="conv-table"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
}
function renderMarkdown(text) {
  if (!text || typeof text !== 'string') return escHtml(String(text || '—'));
  const lines = text.split('\n');
  let html = '';
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    // Fenced code block
    if (line.trim().startsWith('```')) {
      let code = '';
      i++;
      while (i < lines.length && !lines[i].trim().startsWith('```')) { code += lines[i] + '\n'; i++; }
      html += `<pre style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:3px;padding:10px 12px;font-size:12px;overflow-x:auto;margin:8px 0;font-family:monospace;color:var(--text-primary);white-space:pre-wrap">${escHtml(code.trimEnd())}</pre>`;
      i++; continue;
    }
    // Table: starts with | and next line is separator
    if (line.trim().startsWith('|') && i+1 < lines.length && /^\s*\|[-:|\s]+\|\s*$/.test(lines[i+1])) {
      const tbl = [];
      while (i < lines.length && lines[i].trim().startsWith('|')) { tbl.push(lines[i]); i++; }
      html += renderMdTable(tbl); continue;
    }
    // Heading
    const hm = line.match(/^(#{1,3})\s+(.+)$/);
    if (hm) {
      const lvl = hm[1].length;
      const sz = ['17px','14px','13px'][lvl-1];
      html += `<div style="font-size:${sz};font-weight:${lvl===1?'700':'600'};color:var(--text-primary);margin:12px 0 5px;${lvl<=2?'padding-bottom:4px;border-bottom:1px solid var(--border)':''}">${inlineMd(hm[2])}</div>`;
      i++; continue;
    }
    // Unordered list
    if (/^\s*[-*+]\s+/.test(line)) {
      let items = '';
      while (i < lines.length && /^\s*[-*+]\s+/.test(lines[i])) {
        items += `<li style="margin-bottom:3px">${inlineMd(lines[i].replace(/^\s*[-*+]\s+/,''))}</li>`;
        i++;
      }
      html += `<ul style="padding-left:18px;margin:5px 0;color:var(--text-secondary)">${items}</ul>`; continue;
    }
    // Ordered list
    if (/^\s*\d+\.\s+/.test(line)) {
      let items = '';
      while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
        items += `<li style="margin-bottom:3px">${inlineMd(lines[i].replace(/^\s*\d+\.\s+/,''))}</li>`;
        i++;
      }
      html += `<ol style="padding-left:18px;margin:5px 0;color:var(--text-secondary)">${items}</ol>`; continue;
    }
    // HR
    if (/^[-*_]{3,}$/.test(line.trim())) {
      html += '<hr style="border:none;border-top:1px solid var(--border);margin:10px 0">';
      i++; continue;
    }
    // Blank
    if (line.trim() === '') {
      if (html && !html.endsWith('<br>') && !html.endsWith('</ul>') && !html.endsWith('</ol>') && !html.endsWith('</div>') && !html.endsWith('</pre>')) html += '<br>';
      i++; continue;
    }
    // Paragraph
    html += `<p style="margin:3px 0;color:var(--text-secondary);line-height:1.7">${inlineMd(line)}</p>`;
    i++;
  }
  return html || '—';
}

// ── Data Loading ──────────────────────────────────────────────────────────────
let DS_SYNC_HISTORY = [];
let SCREEN_SYNC_HISTORY = [];

async function loadData() {
  try {
    const bust = '?t=' + Date.now();

    const [sessionRes, dashRes] = await Promise.all([
      fetch('session.json' + bust),
      fetch('dashboard.jsonl' + bust),
    ]);

    // session.json — 진행 중 세션
    const sessionData = sessionRes.ok ? await sessionRes.json() : null;
    const liveSession = sessionData && sessionData.id ? sessionData : null;

    // dashboard.jsonl — 항목 파싱 후 ds-sync / 프로젝트 분리
    const dashText = dashRes.ok ? await dashRes.text() : '';
    const allEntries = dashText.trim()
      ? dashText.trim().split('\n').filter(l => l.trim()).map(l => JSON.parse(l))
      : [];

    DS_SYNC_HISTORY     = allEntries.filter(e => e.type === 'ds-sync').reverse();
    SCREEN_SYNC_HISTORY = allEntries.filter(e => e.type === 'screen-sync').reverse();
    SYSTEM_CHANGES      = allEntries.filter(e => e.type === 'system-change').reverse();
    const history       = allEntries.filter(e => e.id && Array.isArray(e.agents)).reverse();

    PROJECTS = [...(liveSession ? [liveSession] : []), ...history];

    // 최근 실행 시각
    if (DS_SYNC_HISTORY.length > 0)     GLOBAL.dsSyncLastAt     = DS_SYNC_HISTORY[0].at;
    if (SCREEN_SYNC_HISTORY.length > 0) GLOBAL.screenSyncLastAt = SCREEN_SYNC_HISTORY[0].at;
    if (SYSTEM_CHANGES.length > 0)      GLOBAL.sysChangeLastAt  = SYSTEM_CHANGES[0].at;

    // 활성 프로젝트 초기화
    if (PROJECTS.length > 0 && !PROJECTS.find(p => p.id === activeProjectId)) {
      activeProjectId = PROJECTS[0].id;
    }

    renderGlobalBar();
    renderSidebar();
    renderProject();
  } catch(e) {
  }
}

// ── Validator Output Parser ───────────────────────────────────────────────────
function parseValidatorOutput(output) {
  if (!output) return null;
  try {
    const parsed = JSON.parse(output);
    if (parsed.result) return parsed;
  } catch(e) {}
  // Extract JSON object embedded in markdown text
  const jsonMatch = output.match(/\{[\s\S]*?"result"\s*:\s*"(PASS|FAIL)"[\s\S]*?\}/);
  if (jsonMatch) {
    try { return JSON.parse(jsonMatch[0]); } catch(e) {}
  }
  // Last resort: find result keyword in text
  const passMatch = output.match(/판정[:\s]*(PASS|FAIL)/);
  if (passMatch) return { result: passMatch[1], blockers: [], warnings: [], notes: [] };
  const kMatch = output.match(/"result"\s*:\s*"(PASS|FAIL)"/);
  if (kMatch) return { result: kMatch[1], blockers: [], warnings: [], notes: [] };
  return null;
}

function buildValidatorResultBadge(output) {
  const v = parseValidatorOutput(output);
  if (!v) return '';
  const r = v.result;
  const blockers = (v.blockers || []).length;
  const warns    = (v.warnings || []).length;
  const notes    = (v.notes    || []).length;
  const parts = [
    blockers > 0 ? `<span class="card-result-blocker">${blockers} BLOCKER</span>` : '',
    warns    > 0 ? `<span class="card-result-warn">${warns} WARN</span>` : '',
    notes    > 0 ? `<span class="card-result-note">${notes} NOTE</span>` : '',
  ].filter(Boolean);
  const counts = parts.length ? `<span class="card-result-counts">${parts.join(' · ')}</span>` : '';
  if (r === 'PASS') return `<div class="card-result"><span class="card-result-pass">PASS</span>${counts}</div>`;
  if (r === 'FAIL') return `<div class="card-result"><span class="card-result-fail">FAIL</span>${counts}</div>`;
  return '';
}

// ── Kanban helpers ────────────────────────────────────────────────────────────
function buildAgentCard(projectId, a, modeLabel) {
  const modeColors = { plan: 'var(--text-muted)', ui: 'var(--text-muted)' };
  const modeColor  = modeColors[modeLabel] || 'var(--text-muted)';
  const modeTag = modeLabel
    ? `<span style="font-size:10px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:${modeColor};margin-right:4px">${modeLabel}</span>`
    : '';

  if (a.status === 'idle') {
    return `
      <div class="kanban-card status-idle" onclick="openAgentModal('${projectId}','${a.id}')">
        <div class="card-status-row">${modeTag}${statusText(a.status)}</div>
        <div class="card-desc" style="font-style:italic;opacity:0.5">소환 대기 중...</div>
      </div>`;
  }

  const figmaBlock = (a.id === 'builder' && a.figma) ? `
    <div class="builder-figma-preview">
      <div class="builder-figma-label">뽀로뽀로미</div>
      <div class="builder-figma-detail">
        ${a.figma.file} / ${a.figma.page}<br>
        frame: ${a.figma.frame}<br>
        node: ${a.figma.nodeId}
      </div>
    </div>` : '';

  const hasAttempts = Array.isArray(a.history) && a.history.length > 0 && typeof a.history[0] === 'object';
  const prevAttempts = hasAttempts ? a.history.slice(0, -1) : [];
  const attemptCards = prevAttempts.map(h => `
    <div class="kanban-card status-${h.status} attempt-prev" onclick="openAgentModal('${projectId}','${a.id}')">
      <div class="card-status-row">
        ${modeTag}${statusText(h.status)}
        <span class="attempt-num">${h.attempt}회차</span>
      </div>
      <div class="card-desc">${h.summary}</div>
      <div class="card-meta">
        <span class="card-time">${h.startedAt || ''}</span>
        <span class="card-duration">${h.duration || ''}</span>
      </div>
    </div>`).join('');

  const isValidator = a.id === 'validator-plan' || a.id === 'validator' || a.id === 'plan-validator';
  const validatorBadge = isValidator ? buildValidatorResultBadge(a.output) : '';

  return attemptCards + `
    <div class="kanban-card status-${a.status}" onclick="openAgentModal('${projectId}','${a.id}')">
      <div class="card-status-row">
        ${modeTag}${statusText(a.status)}
        ${hasAttempts ? `<span class="attempt-num">${a.history.length}회차</span>` : ''}
        ${a.notes ? `<span style="color:var(--accent-amber);font-size:11px;margin-left:auto" title="${a.notes.replace(/"/g,'&quot;')}">⚠</span>` : ''}
      </div>
      ${a.summary ? `<div class="card-summary-line">${escHtml(a.summary)}</div>` : ''}
      ${validatorBadge}
      ${a.output
        ? `<div class="card-thinking">${escHtml(a.output)}</div>`
        : `<div class="card-desc" style="opacity:0.35;font-style:italic">—</div>`}
      ${figmaBlock}
      <div class="card-meta">
        <span class="card-time">${a.startedAt || ''}</span>
        <span class="card-duration">${a.executionDuration ? displayDuration(a) : (a.duration || (a.status === 'running' ? '실행 중' : ''))}</span>
      </div>
    </div>`;
}

// ── Kanban ────────────────────────────────────────────────────────────────────
function renderKanban(p) {
  const agentMap = {};
  p.agents.forEach(a => { agentMap[a.id] = a; });

  document.getElementById('kanban').innerHTML = Object.keys(COL_CONFIG).map(colId => {
    const cfg = COL_CONFIG[colId];
    let cardHtml = '';
    let duration = '—';

    if (colId === 'validator') {
      const aPlan = agentMap['validator-plan'];
      const aUi   = agentMap['validator'];
      const planActive = aPlan && aPlan.status !== 'idle';
      const uiActive   = aUi   && aUi.status   !== 'idle';
      cardHtml = (planActive ? buildAgentCard(p.id, aPlan, 'plan') : '') +
                 (uiActive   ? buildAgentCard(p.id, aUi,   'ui')   : '');
      const running = (aPlan?.status === 'running') || (aUi?.status === 'running');
      duration = running ? '...' : (aUi?.duration || aPlan?.duration || '—');

    } else {
      const a = agentMap[colId];
      if (a && a.status !== 'idle') {
        duration = a.executionDuration ? displayDuration(a) : (a.duration || (a.status === 'running' ? '...' : '—'));
        cardHtml = buildAgentCard(p.id, a, null);
      }
    }

    return `
      <div class="kanban-col ${colId === 'builder' ? 'col-builder' : ''}" style="--col-accent:${cfg.accent}">
        <div class="kanban-col-header">
          <div class="kanban-col-title">
            <img class="col-class-icon" src="${cfg.icon}" alt="${cfg.label}">
            <span class="kanban-col-name">${cfg.label}</span>
          </div>
          <span class="kanban-col-duration">${duration}</span>
        </div>
        <div class="kanban-col-body">${cardHtml}</div>
      </div>`;
  }).join('');
}

// ── Logs ──────────────────────────────────────────────────────────────────────
function renderLogs(p) {
  // 실행 로그: 에이전트 실행 이벤트만 (director 제외)
  const execLogs = (p.logs || []).filter(l => l.agent !== 'director');
  document.getElementById('log-count').textContent = execLogs.length;
  document.getElementById('log-body').innerHTML = execLogs.slice().reverse().map((l, ri) => {
    const origIdx = p.logs.length - 1 - (p.logs.length - 1 - p.logs.lastIndexOf(l));
    return `
      <div class="log-line ${getLogClass(l.type)}">
        <span class="log-ts">${l.ts}</span>
        <span class="log-agent"><span class="badge ${getAgentBadge(l.agent)}">${getAgentLabel(l.agent)}</span></span>
        <span class="log-msg">${escHtml(l.msg)}</span>
      </div>`;
  }).join('');
}

// ── Director Panel (inline) ───────────────────────────────────────────────────
function renderDirectorPanel(p) {
  const el = document.getElementById('director-inline-body');
  if (!el) return;

  const dirLogs = (p.logs || []).filter(l => l.agent === 'director');

  if (dirLogs.length === 0) {
    el.innerHTML = `<div class="dp-empty">대화 내역 없음</div>`;
    return;
  }

  el.innerHTML = dirLogs.map(l => `
    <div class="dp-director-msg">
      <span class="dp-ts">${l.ts}</span>
      <span class="log-agent"><span class="badge badge-gray">director</span></span>
      <span class="dp-msg">${escHtml(l.msg)}</span>
    </div>`).join('');
}

// ── Render Project ────────────────────────────────────────────────────────────
function renderProject() {
  const p = PROJECTS.find(x => x.id === activeProjectId);
  if (!p) { renderEmptyState(); return; }
  renderProjectHeader(p);
  renderKanban(p);
  renderLogs(p);
  renderDirectorPanel(p);
}

function renderEmptyState() {
  document.getElementById('project-name-row').innerHTML =
    `<span class="project-name" style="color:var(--text-muted)">작업 없음</span>`;
  const briefEl = document.getElementById('project-brief');
  if (briefEl) briefEl.textContent = '';
  document.getElementById('project-meta-row').innerHTML = '';

  document.getElementById('kanban').innerHTML = Object.keys(COL_CONFIG).map(colId => {
    const cfg = COL_CONFIG[colId];
    return `
      <div class="kanban-col ${colId === 'builder' ? 'col-builder' : ''}" style="--col-accent:${cfg.accent}">
        <div class="kanban-col-header">
          <div class="kanban-col-title">
            <img class="col-class-icon" src="${cfg.icon}" alt="${cfg.label}">
            <span class="kanban-col-name">${cfg.label}</span>
          </div>
          <span class="kanban-col-duration">—</span>
        </div>
        <div class="kanban-col-body"></div>
      </div>`;
  }).join('');

  document.getElementById('log-count').textContent = '0';
  document.getElementById('log-body').innerHTML =
    `<div style="padding:24px 0;text-align:center;color:var(--text-muted);font-size:13px">작업 기록이 없습니다</div>`;
  document.getElementById('director-inline-body').innerHTML =
    `<div class="dp-empty">대화 내역 없음</div>`;
}

// ── Agent Modal ───────────────────────────────────────────────────────────────
function openAgentModal(projectId, agentId) {
  const p = PROJECTS.find(x => x.id === projectId);
  if (!p) return;
  const a = p.agents.find(x => x.id === agentId);
  if (!a) return;

  if (agentId === 'builder' && a.figma) { renderBuilderModal(a); openModal('modal-builder'); return; }

  const cfg = COL_CONFIG[agentId] || {};
  document.getElementById('modal-agent-title').innerHTML = `
    ${cfg.icon ? `<img class="modal-agent-icon" src="${cfg.icon}" alt="${a.name}">` : ''}
    ${a.name}`;

  const notesHtml = a.notes ? `
    <div class="modal-section">
      <div class="modal-section-title">비고</div>
      <div style="font-size:13px;color:var(--accent-amber);line-height:1.65;font-family:'Pretendard',sans-serif;font-size:12px">${a.notes}</div>
    </div>` : '';

  document.getElementById('modal-agent-body').innerHTML = `
    <div class="modal-section">
      <div class="modal-kv">
        <span class="modal-kv-key">상태</span><span class="modal-kv-val">${getStatusBadge(a.status)}</span>
        <span class="modal-kv-key">시작</span><span class="modal-kv-val">${a.startedAt || '—'}</span>
        <span class="modal-kv-key">소요 시간</span><span class="modal-kv-val">${a.executionDuration ? displayDuration(a) : (a.duration || (a.status === 'running' ? '실행 중' : '—'))}</span>
      </div>
    </div>
    <div class="divider"></div>
    <div class="modal-section">
      <div class="modal-section-title">요약</div>
      <div style="font-size:14px;color:var(--text-secondary);line-height:1.7">${escHtml(a.summary || '—')}</div>
    </div>
    ${a.output ? `
    <div class="modal-section">
      <div class="modal-section-title">대화 내역</div>
      <div style="font-size:13px;line-height:1.7;font-family:'Pretendard',sans-serif">${renderMarkdown(a.output)}</div>
    </div>` : ''}
    ${notesHtml}
  `;
  openModal('modal-agent');
}

// ── Builder Modal ─────────────────────────────────────────────────────────────
function renderBuilderModal(a) {
  const f = a.figma;
  document.getElementById('modal-builder-body').innerHTML = `
    <div class="modal-section">
      <div class="modal-kv">
        <span class="modal-kv-key">상태</span><span class="modal-kv-val">${getStatusBadge(a.status)}</span>
        <span class="modal-kv-key">시작</span><span class="modal-kv-val">${a.startedAt || '—'}</span>
        <span class="modal-kv-key">소요 시간</span><span class="modal-kv-val">${a.executionDuration ? displayDuration(a) : (a.duration || '—')}</span>
      </div>
    </div>
    <div class="divider"></div>
    <div class="figma-result-box">
      <div class="figma-result-title">뽀로뽀로미 소환 기록</div>
      <div class="figma-result-grid">
        <div class="figma-result-cell"><div class="frc-label">파일</div><div class="frc-value">${f.file}</div></div>
        <div class="figma-result-cell"><div class="frc-label">페이지</div><div class="frc-value">${f.page}</div></div>
        <div class="figma-result-cell"><div class="frc-label">프레임</div><div class="frc-value">${f.frame}</div></div>
        <div class="figma-result-cell"><div class="frc-label">노드 ID</div><div class="frc-value">${f.nodeId}</div></div>
        <div class="figma-result-cell"><div class="frc-label">위치 (x, y)</div><div class="frc-value">${f.x}, ${f.y}</div></div>
        <div class="figma-result-cell"><div class="frc-label">소환 화면 수</div><div class="frc-value">${f.screens}개</div></div>
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">요약</div>
      <div style="font-size:13px;color:var(--text-secondary);line-height:1.7">${a.summary}</div>
    </div>
  `;
}

// ── Log Detail Modal ──────────────────────────────────────────────────────────
function openLogDetailModal(projectId, logIndex) {
  const p = PROJECTS.find(x => x.id === projectId);
  if (!p) return;
  const log = p.logs[logIndex];
  const typeLabel = { rollback:'롤백', complete:'완료', start:'시작', error:'오류', figma:'Figma' };

  document.getElementById('modal-log-body').innerHTML = `
    <div class="modal-section">
      <div class="modal-kv">
        <span class="modal-kv-key">시간</span><span class="modal-kv-val">${log.ts}</span>
        <span class="modal-kv-key">에이전트</span><span class="modal-kv-val"><span class="badge ${getAgentBadge(log.agent)}">${log.agent}</span></span>
        <span class="modal-kv-key">유형</span><span class="modal-kv-val">${typeLabel[log.type] || log.type}</span>
      </div>
    </div>
    <div class="divider"></div>
    <div class="modal-section">
      <div class="modal-section-title">메시지</div>
      <div style="font-size:13px;line-height:1.7;color:var(--text-primary);font-family:'Pretendard',sans-serif;font-size:12px">${log.msg}</div>
    </div>
    <div class="divider"></div>
    <div class="modal-section">
      <div class="modal-section-title">전체 기록 — ${p.name}</div>
      <div class="modal-log-list">
        ${p.logs.map((l, i) => `
          <div class="modal-log-item ${getLogClass(l.type)}" style="${i === logIndex ? 'background:var(--bg-elevated);padding-left:6px;border-radius:3px' : ''}">
            <span class="modal-log-ts">${l.ts}</span>
            <span class="modal-log-text">[${getAgentLabel(l.agent)}] ${l.msg}</span>
          </div>`).join('')}
      </div>
    </div>
  `;
  openModal('modal-log');
}

function renderLogModal() {
  const p = PROJECTS.find(x => x.id === activeProjectId);
  if (!p) return;
  document.getElementById('modal-log-body').innerHTML = `
    <div class="modal-log-list">
      ${p.logs.map(l => `
        <div class="modal-log-item ${getLogClass(l.type)}">
          <span class="modal-log-ts">${l.ts}</span>
          <span class="modal-log-text">[${getAgentLabel(l.agent)}] ${l.msg}</span>
        </div>`).join('')}
    </div>
  `;
}

// ── Overview Modal ────────────────────────────────────────────────────────────
function renderOverviewModal() {
  const p = PROJECTS.find(x => x.id === activeProjectId);
  if (!p) return;
  document.getElementById('modal-overview-title').textContent = p.name;
  const doneCount     = p.agents.filter(a => a.status === 'done').length;
  const rollbackCount = p.logs.filter(l => l.type === 'rollback').length;
  const errorCount    = p.logs.filter(l => l.type === 'error').length;

  document.getElementById('modal-overview-body').innerHTML = `
    <div class="overview-stat-grid">
      <div class="overview-stat">
        <div class="overview-stat-val text-green">${doneCount}/${p.agents.length}</div>
        <div class="overview-stat-label">에이전트 완료</div>
      </div>
      <div class="overview-stat">
        <div class="overview-stat-val text-amber">${rollbackCount}</div>
        <div class="overview-stat-label">롤백 횟수</div>
      </div>
      <div class="overview-stat">
        <div class="overview-stat-val ${errorCount > 0 ? 'text-red' : 'text-muted'}">${errorCount}</div>
        <div class="overview-stat-label">오류 발생</div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="modal-section">
      <div class="modal-kv">
        <span class="modal-kv-key">상태</span><span class="modal-kv-val">${getStatusBadge(p.status)}</span>
        <span class="modal-kv-key">모드</span><span class="modal-kv-val">${p.mode}</span>
        <span class="modal-kv-key">시작</span><span class="modal-kv-val">${p.startedAt || '—'}</span>
        <span class="modal-kv-key">완료</span><span class="modal-kv-val">${p.completedAt || '—'}</span>
        <span class="modal-kv-key">총 소요</span><span class="modal-kv-val">${p.duration || '진행 중'}</span>
        <span class="modal-kv-key">롤백</span><span class="modal-kv-val">${p.rollback ? '<span class="badge badge-amber">있음</span>' : '없음'}</span>
      </div>
    </div>
    <div class="divider"></div>
    <div class="modal-section">
      <div class="modal-section-title">참여 에이전트</div>
      <div class="modal-kv">
        ${p.agents.map(a => `
          <span class="modal-kv-key"><span class="badge ${getAgentBadge(a.id)}">${a.name}</span></span>
          <span class="modal-kv-val">${a.executionDuration ? displayDuration(a) : (a.duration || (a.status === 'running' ? '실행 중...' : '—'))}</span>
        `).join('')}
      </div>
    </div>
  `;
}

// ── Splash ────────────────────────────────────────────────────────────────────
(function() {
  const splash = document.getElementById('splash');
  if (sessionStorage.getItem('splashShown')) {
    splash.style.display = 'none';
    return;
  }
  sessionStorage.setItem('splashShown', '1');
  setTimeout(() => {
    splash.classList.add('fade-out');
    setTimeout(() => { splash.style.display = 'none'; }, 600);
  }, 3000);
})();

// ── Init ──────────────────────────────────────────────────────────────────────
loadData();
setInterval(loadData, 3000);
</script>
</body>
</html>
